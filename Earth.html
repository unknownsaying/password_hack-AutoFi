<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clone Earth - Interactive 3D Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-left: 4px solid #00aaff;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; padding: 8px 16px; }
            #controls-note { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🌍 CLONE EARTH | High-Resolution Texture | Realistic 3D Globe
    </div>
    <div id="controls-note">
        🖱️ Drag to rotate | Scroll to zoom
    </div>

    <!-- Import Three.js core and add-ons from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a); // Deep space color
        scene.fog = new THREE.FogExp2(0x050b1a, 0.0003); // subtle fog for depth

        // Camera: perspective camera with 45deg FOV, aspect auto, near/far planes
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.2);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // --- Controls for interactive exploration ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // smooth inertia
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.enablePan = false;         // disable panning to keep earth centered
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);
        
        // --- Create Earth Sphere ---
        // High-resolution Earth map (diffuse/albedo) from reliable Three.js examples source
        // Using a beautiful 4K-ish texture (4096x2048 equivalent but optimized load)
        // This texture is a classic earth map with clouds, land, and oceans.
        const earthMapUrl = 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';
        // Earth specular map (shininess / water reflections)
        const earthSpecularUrl = 'https://threejs.org/examples/textures/planets/earth_specular_2048.jpg';
        // Earth normal map for terrain bump effect
        const earthNormalUrl = 'https://threejs.org/examples/textures/planets/earth_normal_2048.jpg';
        // Cloud layer texture (alpha map for transparency)
        const cloudMapUrl = 'https://threejs.org/examples/textures/planets/earth_clouds_1024.png';
        
        // 1. Main Earth Material: MeshPhongMaterial with maps for realistic look
        const earthGeometry = new THREE.SphereGeometry(1.0, 128, 128); // high poly smooth sphere
        
        // Load textures using TextureLoader
        const textureLoader = new THREE.TextureLoader();
        
        const earthMap = textureLoader.load(earthMapUrl);
        const earthSpecular = textureLoader.load(earthSpecularUrl);
        const earthNormal = textureLoader.load(earthNormalUrl);
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecular,
            specular: new THREE.Color('grey'),
            shininess: 5,
            normalMap: earthNormal,
            normalScale: new THREE.Vector2(0.8, 0.8)
        });
        
        const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earthMesh);
        
        // 2. Cloud Layer: Slightly larger sphere with transparent clouds texture
        const cloudGeometry = new THREE.SphereGeometry(1.01, 128, 128);
        const cloudTexture = textureLoader.load(cloudMapUrl);
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudTexture,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending
        });
        const cloudMesh = new THREE.Mesh(cloudGeometry, cloudMaterial);
        scene.add(cloudMesh);
        
        // 3. Optional: Atmosphere glow effect (subtle outer halo)
        const atmosphereGeometry = new THREE.SphereGeometry(1.08, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x88bbff,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const atmosphereMesh = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphereMesh);
        
        // --- Starfield Background: Particle System for immersive space ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            // Random positions in a sphere of radius 200-500
            const radius = 300 + Math.random() * 200;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = radius * Math.cos(phi);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.35,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Add a second layer of tiny distant stars (more dense)
        const starGeometry2 = new THREE.BufferGeometry();
        const starCount2 = 2500;
        const starPositions2 = new Float32Array(starCount2 * 3);
        for (let i = 0; i < starCount2; i++) {
            starPositions2[i*3] = (Math.random() - 0.5) * 800;
            starPositions2[i*3+1] = (Math.random() - 0.5) * 800;
            starPositions2[i*3+2] = (Math.random() - 0.5) * 300 - 100;
        }
        starGeometry2.setAttribute('position', new THREE.BufferAttribute(starPositions2, 3));
        const starMaterial2 = new THREE.PointsMaterial({
            color: 0xaaccff,
            size: 0.18,
            transparent: true,
            opacity: 0.6
        });
        const stars2 = new THREE.Points(starGeometry2, starMaterial2);
        scene.add(stars2);
        
        // --- Lighting Setup for realistic earth illumination ---
        // Ambient light to softly illuminate dark side
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        
        // Main directional light (simulating sun)
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(5, 3, 5);
        sunLight.castShadow = false; // shadows disabled for performance
        scene.add(sunLight);
        
        // Fill light from the opposite side to avoid pure black shadows
        const fillLight = new THREE.DirectionalLight(0x88aaff, 0.25);
        fillLight.position.set(-3, -1, -2);
        scene.add(fillLight);
        
        // A subtle back rim light to enhance edges
        const rimLight = new THREE.PointLight(0x4488ff, 0.3);
        rimLight.position.set(-2, 1, -3);
        scene.add(rimLight);
        
        // Additional warm fill from below for atmosphere
        const warmFill = new THREE.PointLight(0xffaa66, 0.2);
        warmFill.position.set(1, -2, 1);
        scene.add(warmFill);
        
        // --- Optional: simple animation for clouds and stars? Cloud rotation subtle ---
        // Also slight auto-rotation optional but OrbitControls will override if user interacts.
        // We'll add a small idle rotation only if user hasn't interacted? Instead, we can rotate clouds independently.
        // Clouds rotate at a slower rate to simulate drift.
        let time = 0;
        
        // Simple function to slowly rotate the cloud layer and stars for subtle motion
        function animateCelestial() {
            requestAnimationFrame(animateCelestial);
            
            // Update cloud rotation (drift effect)
            cloudMesh.rotation.y += 0.0008;
            // Very slow star rotation for ambiance
            stars.rotation.y += 0.0001;
            stars.rotation.x += 0.00005;
            stars2.rotation.y -= 0.00007;
            
            // Update controls and render
            controls.update(); // updates camera if autoRotate is false, but needed for damping
            
            renderer.render(scene, camera);
        }
        
        // Start animation loop
        animateCelestial();
        
        // --- Handle window resize responsively ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Simple loading indicator (optional) - textures might take a moment, but they are from fast CDN.
        console.log('🌐 Clone Earth Map Loaded | Interactive 3D Globe');
        
        // Small effect: add a tiny lens flare substitute? Not needed, but add a star glow via postprocessing? skip for simplicity.
        
        // Enhance the initial camera angle slightly for a nice view
        camera.position.set(0.2, 0.1, 3.4);
        controls.target.set(0, 0, 0);
        controls.update();
        
        // Bonus: add a very faint grid helper or axis? Not needed, but to showcase "clone" we keep clean.
        
        // For debugging texture loading (no errors displayed, but console if needed)
        // The used textures are from Three.js examples, which are reliable and high-quality.
        // They represent a true "Clone Earth" with realistic mapping.
    </script>
</body>
</html>
